<div class="login-container">
  <button mat-icon-button class="back-btn" (click)="goToHome()" aria-label="Retour à l'accueil">
    <span class="material-symbols-outlined">arrow_left_alt</span>
  </button>
  <mat-card class="login-card">
    <div class="page-header">
      <img src="/assets/logo_p6.png" alt="MDD Logo" class="mobile-logo" />
      <h2 class="page-title">Se connecter</h2>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="field-group">
            <label class="field-label">Email ou nom d'utilisateur</label>
            <mat-form-field appearance="outline" class="full-width">
              <input
                matInput
                type="text"
                formControlName="emailOrUsername"
                autocomplete="username"
              />
              <mat-error *ngIf="loginForm.get('emailOrUsername')?.hasError('required')">
                Ce champ est obligatoire
              </mat-error>
            </mat-form-field>
          </div>

          <div class="field-group">
            <label class="field-label">Mot de passe</label>
            <mat-form-field appearance="outline" class="full-width">
              <input
                matInput
                type="password"
                formControlName="password"
                autocomplete="current-password"
              />
              <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
                Le mot de passe est obligatoire
              </mat-error>
              <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
                Le mot de passe doit contenir au moins 6 caractères
              </mat-error>
            </mat-form-field>
          </div>

        <div class="error-message" *ngIf="errorMessage">
          <mat-error>{{ errorMessage }}</mat-error>
        </div>

        <div class="actions">
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="loginForm.invalid || loading"
          >
            <span *ngIf="!loading">Se connecter</span>
            <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          </button>
        </div>
      </form>
    </mat-card-content>


  </mat-card>
</div>
