<app-navbar></app-navbar>

<div class="feed-container">

  <div class="feed-header">
    <button mat-raised-button color="primary" class="create-btn" (click)="goToCreatePost()">
      Créer un article
    </button>
    <button class="sort-btn" (click)="toggleSort()">
      Trier par <span>↓</span>
    </button>
  </div>

  <p class="empty-msg" *ngIf="isEmpty">
    Vous n'avez aucun article — abonnez-vous à des thèmes pour voir des articles.
  </p>

  <div class="posts-grid" *ngIf="!isEmpty">
    <div class="post-card" *ngFor="let post of posts" (click)="goToPost(post.id)">
      <h3>{{ post.title }}</h3>
      <div class="post-meta">
        <span>{{ post.createdAt | date:'dd/MM/yyyy' }}</span>
        <span>{{ post.authorUsername }}</span>
      </div>
      <p>{{ post.content }}</p>
    </div>
  </div>

</div>
