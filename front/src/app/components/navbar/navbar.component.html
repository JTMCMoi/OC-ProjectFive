<mat-toolbar class="navbar">
  <!-- Logo -->
  <a class="navbar-logo" routerLink="/">
    <img src="/assets/logo_p6.png" alt="MDD Logo" class="logo" />
  </a>

  <span class="spacer"></span>

  <!-- Actions desktop (masquées sur mobile) -->
  <ng-container *ngIf="isLogged$ | async">
    <div class="desktop-nav">
      <button mat-stroked-button class="logout-btn" (click)="logout()">
        <span class="btn-label">Se déconnecter</span>
      </button>
      <button mat-stroked-button class="nav-link-btn" routerLink="/" routerLinkActive="active-nav" [routerLinkActiveOptions]="{exact: true}">
        <span class="btn-label">Articles</span>
      </button>
      <button mat-stroked-button class="nav-link-btn" routerLink="/themes" routerLinkActive="active-nav">
        <span class="btn-label">Thèmes</span>
      </button>
      <button mat-icon-button class="nav-icon-btn" routerLink="/profile" routerLinkActive="active-nav">
        <mat-icon>account_circle</mat-icon>
      </button>
    </div>

    <!-- Hamburger mobile à droite -->
    <button mat-icon-button class="hamburger-btn" (click)="menuToggle.emit()" aria-label="Menu">
      <mat-icon>menu</mat-icon>
    </button>
  </ng-container>
</mat-toolbar>
