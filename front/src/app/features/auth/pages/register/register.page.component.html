<div class="top-header">
  <button mat-icon-button class="back-button" routerLink="/">
    <mat-icon>arrow_back</mat-icon>
  </button>
</div>

<div class="register-container">
  <mat-card class="register-card">
    <h2>Inscription</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Nom d'utilisateur -->
      <div class="form-group">
        <label for="username" class="custom-label">Nom d’utilisateur</label>
        <input id="username" type="text" formControlName="username" class="custom-input" />
        <p class="error" *ngIf="form.get('username')?.invalid && (form.get('username')?.touched || form.get('username')?.dirty)">
          Le nom d'utilisateur est requis (min 3 caractères)
        </p>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email" class="custom-label">Adresse e-mail</label>
        <input id="email" type="email" formControlName="email" class="custom-input" />
        <p class="error" *ngIf="form.get('email')?.invalid && (form.get('email')?.touched || form.get('email')?.dirty)">
          Email invalide
        </p>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label for="password" class="custom-label">Mot de passe</label>
        <input id="password" type="password" formControlName="password" class="custom-input" />
        <p class="error" *ngIf="form.get('password')?.invalid && (form.get('password')?.touched || form.get('password')?.dirty)">
          Min 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial
        </p>
      </div>

      <!-- Bouton submit -->
      <button mat-raised-button color="primary" type="submit" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">S’inscrire</span>
      </button>

      <!-- Erreur globale -->
      <p class="error" *ngIf="error">{{ error }}</p>

    </form>
  </mat-card>
</div>
