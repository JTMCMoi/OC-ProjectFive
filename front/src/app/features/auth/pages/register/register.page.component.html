<div class="register-container">
  <mat-card>

    <h2>Inscription</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nom d’utilisateur</mat-label>
        <input matInput formControlName="username">
        <mat-error *ngIf="form.get('username')?.invalid">
          Le nom d'utilisateur est requis (min 3 caractères)
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Adresse e-mail</mat-label>
        <input matInput type="email" formControlName="email">
        <mat-error *ngIf="form.get('email')?.invalid">
          Email invalide
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input matInput type="password" formControlName="password">
        <mat-error *ngIf="form.get('password')?.invalid">
          Min 8 caractères, une majuscule, une minuscule, un chiffre et un caractère spécial
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width" [disabled]="loading">
        <mat-spinner *ngIf="loading" [diameter]="20"></mat-spinner>
        <span *ngIf="!loading">S’inscrire</span>
      </button>

      <p *ngIf="error" class="error">{{ error }}</p>

    </form>

  </mat-card>
</div>
