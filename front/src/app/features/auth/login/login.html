<div class="login-page">
    <button mat-icon-button routerLink="/" class="back-btn">
        <mat-icon>arrow_back</mat-icon>
    </button>
    <header class="login-header">
        <img src="logo_p6.png" alt="Logo Monde De Dév" class="logo" />
    </header>
    <div class="login-container">
        <h1>Se connecter</h1>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline">
                <mat-label>E-mail ou nom d'utilisateur</mat-label>
                <input matInput formControlName="login" />
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Mot de passe</mat-label>
                <input matInput type="password" formControlName="password" />
            </mat-form-field>
            <button mat-flat-button type="submit">Se connecter</button>
        </form>
    </div>
</div>
