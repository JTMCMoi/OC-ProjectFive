<div class="feed-header">
  <div class="left-side">
    <button mat-raised-button color="primary" routerLink="/posts/create-post">
      Créer un article
    </button>
  </div>

  <div class="right-side">
    <div class="sort-container" (click)="toggleSort()" style="cursor: pointer;">
      <span>Trier par</span>
      <mat-icon>{{ selectedSort === 'asc' ? 'arrow_upward' : 'arrow_downward' }}</mat-icon>
    </div>
  </div>
</div>

<section class="feed">
  <app-post-card *ngFor="let post of posts" [post]="post" variant="feed"></app-post-card>
</section>
