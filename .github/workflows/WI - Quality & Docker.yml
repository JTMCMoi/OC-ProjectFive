name: CI/CD Pipeline — MDD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend — Tests & Couverture

    steps:
      - uses: actions/checkout@v4

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Injection des variables d'environnement de test
        run: |
          echo "DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE" >> $GITHUB_ENV
          echo "DB_USERNAME=sa"                                                       >> $GITHUB_ENV
          echo "DB_PASSWORD="                                                         >> $GITHUB_ENV
          echo "JWT_SECRET=ci-test-secret-key-minimum-64-characters-long-for-hmac-sha256-algorithm" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=86400000"                                              >> $GITHUB_ENV

      - name: Compilation, tests et couverture JaCoCo
        run: |
          cd back
          ./mvnw clean verify jacoco:report --no-transfer-progress

      - name: Upload couverture backend vers Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./back/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Archivage du rapport JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: back/target/site/jacoco/

  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend — Tests & Couverture

    steps:
      - uses: actions/checkout@v4

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances
        run: cd front && npm ci

      # Jest (pas Karma) — pas besoin de Chrome headless
      - name: Exécution des tests Jest avec couverture
        run: |
          cd front
          npm test -- --watchAll=false --passWithNoTests --ci --coverage

      - name: Upload couverture frontend vers Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./front/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Archivage du rapport de couverture Jest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: front/coverage/

  coverage-report:
    runs-on: ubuntu-latest
    name: Résumé de couverture
    needs: [ backend-tests, frontend-tests ]
    if: always()

    steps:
      - name: Téléchargement du rapport backend
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend-coverage

      - name: Téléchargement du rapport frontend
        uses: actions/download-artifact@v4
        with:
          name: jest-coverage-report
          path: frontend-coverage

      - name: Affichage du résumé
        run: |
          echo "=== Rapport de couverture Backend (JaCoCo) ==="
          if [ -f backend-coverage/index.html ]; then
            echo "Rapport JaCoCo généré avec succès"
          fi
          echo "=== Rapport de couverture Frontend (Jest) ==="
          if [ -f frontend-coverage/lcov.info ]; then
            echo "Rapport Jest généré avec succès"
          fi