name: CI/CD Pipeline — MDD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Tests & couverture backend (Spring Boot / Java 17)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests & Coverage

    steps:
      - uses: actions/checkout@v4

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Injection des variables d'environnement de test
        run: |
          echo "DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE" >> $GITHUB_ENV
          echo "DB_USERNAME=sa"                                                       >> $GITHUB_ENV
          echo "DB_PASSWORD="                                                         >> $GITHUB_ENV
          echo "JWT_SECRET=ci-test-secret-key-minimum-64-characters-long-for-hmac-sha256-algorithm" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=86400000"                                              >> $GITHUB_ENV

      # Fix permission denied sur mvnw
      - name: Rendre mvnw exécutable
        run: chmod +x back/mvnw

      - name: Build, tests et couverture JaCoCo
        run: |
          cd back
          mvn clean install -DskipTests=false

      - name: Générer le rapport JaCoCo
        run: |
          cd back
          mvn jacoco:report

      - name: Archivage du rapport JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: back/target/site/jacoco/

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Tests & couverture frontend (Angular / Jest)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests & Coverage

    steps:
      - uses: actions/checkout@v4

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances
        run: cd front && npm ci

      - name: Exécution des tests Jest avec couverture
        run: |
          cd front
          npm test -- --watchAll=false --passWithNoTests --ci --coverage

      - name: Archivage du rapport de couverture Jest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: front/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Résumé des rapports de couverture
  # ─────────────────────────────────────────────────────────────────────────────
  coverage-report:
    runs-on: ubuntu-latest
    name: Coverage Report Summary
    needs: [ backend-tests, frontend-tests ]
    if: always()

    steps:
      - name: Téléchargement du rapport backend
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend-coverage

      - name: Téléchargement du rapport frontend
        uses: actions/download-artifact@v4
        with:
          name: jest-coverage-report
          path: frontend-coverage

      - name: Affichage du résumé
        run: |
          echo "=== Backend Coverage Report ==="
          if [ -f backend-coverage/index.html ]; then
            echo "JaCoCo report generated successfully"
          fi
          echo "=== Frontend Coverage Report ==="
          if [ -f frontend-coverage/lcov.info ]; then
            echo "Jest coverage report generated successfully"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Analyse SonarCloud — Backend
  # ─────────────────────────────────────────────────────────────────────────────
  sonar-backend:
    name: SonarCloud Analysis - Backend
    runs-on: ubuntu-latest
    needs: [ backend-tests ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Injection des variables d'environnement
        run: |
          echo "DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"                          >> $GITHUB_ENV
          echo "DB_USERNAME=sa"                                                        >> $GITHUB_ENV
          echo "DB_PASSWORD="                                                          >> $GITHUB_ENV
          echo "JWT_SECRET=ci-test-secret-key-minimum-64-characters-long-for-hmac-sha256-algorithm" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=86400000"                                               >> $GITHUB_ENV

      - name: Analyse SonarCloud Backend
        run: |
          cd back
          mvn compile sonar:sonar \
            -Dsonar.projectKey=mdd-api-backend \
            -Dsonar.organization=davidcardig \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_MDD }} \
            -Dsonar.sources=src/main/java \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Analyse SonarCloud — Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  sonar-frontend:
    name: SonarCloud Analysis - Frontend
    runs-on: ubuntu-latest
    needs: [ frontend-tests ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installation des dépendances
        run: cd front && npm ci

      # Même approche que ton ancien pipeline qui fonctionnait
      - name: Analyse SonarCloud Frontend
        run: |
          docker run --rm \
            -e SONAR_HOST_URL=${{ secrets.SONAR_HOST_URL }} \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN_MDD }} \
            -e SONAR_SCANNER_OPTS="-Dsonar.projectKey=mdd-frontend -Dsonar.organization=davidcardig -Dsonar.sources=src -Dsonar.tests=src -Dsonar.test.inclusions=**/*.spec.ts -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts" \
            -v "${{ github.workspace }}/front":/usr/src \
            -w /usr/src \
            sonarsource/sonar-scanner-cli