name: CI/CD Pipeline — MDD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend — Tests & Couverture

    steps:
      - uses: actions/checkout@v4

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Injection des variables d'environnement de test
        run: |
          echo "DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE" >> $GITHUB_ENV
          echo "DB_USERNAME=sa"                                                       >> $GITHUB_ENV
          echo "DB_PASSWORD="                                                         >> $GITHUB_ENV
          echo "JWT_SECRET=ci-test-secret-key-minimum-64-characters-long-for-hmac-sha256-algorithm" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=86400000"                                              >> $GITHUB_ENV

      - name: Compilation, tests et couverture JaCoCo
        run: |
          cd back
          ./mvnw clean verify jacoco:report --no-transfer-progress

      - name: Archivage du rapport JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: back/target/site/jacoco/


  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend — Tests & Couverture

    steps:
      - uses: actions/checkout@v4

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances
        run: cd front && npm ci

      - name: Exécution des tests Jest avec couverture
        run: |
          cd front
          npm test -- --watchAll=false --passWithNoTests --ci --coverage

      - name: Archivage du rapport de couverture Jest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: front/coverage/


  coverage-report:
    runs-on: ubuntu-latest
    name: Résumé de couverture
    needs: [ backend-tests, frontend-tests ]
    if: always()

    steps:
      - name: Téléchargement du rapport backend
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend-coverage

      - name: Téléchargement du rapport frontend
        uses: actions/download-artifact@v4
        with:
          name: jest-coverage-report
          path: frontend-coverage

      - name: Affichage du résumé
        run: |
          echo "=== Rapport de couverture Backend (JaCoCo) ==="
          if [ -f backend-coverage/index.html ]; then
            echo "Rapport JaCoCo généré avec succès"
          fi
          echo "=== Rapport de couverture Frontend (Jest) ==="
          if [ -f frontend-coverage/lcov.info ]; then
            echo "Rapport Jest généré avec succès"
          fi
  

  sonar-backend:
    name: SonarCloud — Backend
    runs-on: ubuntu-latest
    needs: [ backend-tests ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration du JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Injection des variables d'environnement
        run: |
          echo "DB_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1"                          >> $GITHUB_ENV
          echo "DB_USERNAME=sa"                                                        >> $GITHUB_ENV
          echo "DB_PASSWORD="                                                          >> $GITHUB_ENV
          echo "JWT_SECRET=ci-test-secret-key-minimum-64-characters-long-for-hmac-sha256-algorithm" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=86400000"                                               >> $GITHUB_ENV

      - name: Analyse SonarCloud Backend
        run: |
          cd back
          ./mvnw verify sonar:sonar \
            -Dsonar.projectKey=mdd-api-backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_MDD }} \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
  

  sonar-frontend:
    name: SonarCloud — Frontend
    runs-on: ubuntu-latest
    needs: [ frontend-tests ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: cd front && npm ci

      - name: Analyse SonarCloud Frontend
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_MDD }}
        with:
          projectBaseDir: front
          args: >
            -Dsonar.projectKey=mdd-frontend
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/*.spec.ts