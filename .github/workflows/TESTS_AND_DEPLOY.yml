name: CI/CD Pipeline — MDD

on:
  push:
    branches: [ main, DEV-FIX-WORKFLOW ]
  workflow_dispatch:

env:
  DB_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  DB_USERNAME: sa
  DB_PASSWORD: ""
  JWT_SECRET: ci-test-secret-key-minimum-64-characters-long-for-hmac-sha256-algorithm
  JWT_EXPIRATION: 86400000

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests & Coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: chmod +x back/mvnw
      - run: cd back && mvn clean install -DskipTests=false
      - run: cd back && mvn jacoco:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-build
          path: |
            back/target/site/jacoco/
            back/target/classes/
            back/target/surefire-reports/

  frontend-tests:
    runs-on: ubuntu-latest
    name: Frontend Tests & Coverage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json
      - run: cd front && npm ci
      - run: cd front && npm test -- --watchAll=false --passWithNoTests --ci --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: front/coverage/

  sonar-backend:
    runs-on: ubuntu-latest
    name: SonarCloud Analysis - Backend
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: back/target
      - run: |
          cd back && mvn org.sonarsource.scanner.maven:sonar-maven-plugin:5.0.0.4389:sonar \
            -Dsonar.organization=davidcardig \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_MDD }} \
            -Dsonar.junit.reportPaths=target/surefire-reports

  sonar-frontend:
    runs-on: ubuntu-latest
    name: SonarCloud Analysis - Frontend
    needs: frontend-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd front && npm ci
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage
      - run: |
          docker run --rm \
            -e SONAR_HOST_URL=https://sonarcloud.io \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN_MDD }} \
            -e SONAR_SCANNER_OPTS="-Dsonar.organization=davidcardig" \
            -v "${{ github.workspace }}/front":/usr/src \
            -w /usr/src \
            sonarsource/sonar-scanner-cli

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ sonar-backend, sonar-frontend ]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/DEV-FIX-WORKFLOW') && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mdd-back:latest
      - uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mdd-front:latest